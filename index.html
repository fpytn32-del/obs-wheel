<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Inter', sans-serif; background: transparent; }
        #main-layout { position: relative; transition: 1.2s ease; }
        body.idle #main-layout { filter: blur(10px) brightness(0.3); transform: scale(0.92); }
        body.winner-active #main-layout { filter: brightness(0.1) blur(25px); transform: scale(0.8); }

        .glass-panel {
            position: fixed; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(212, 175, 55, var(--op, 0.7)) 0%, rgba(138, 109, 59, var(--op, 0.8)) 100%);
            backdrop-filter: blur(calc(var(--blur, 15) * 1px)); border: 3px solid #fff; border-radius: 35px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.5); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.8s ease; padding: 10px; box-sizing: border-box; text-align: center;
        }
        body:not(.idle) .glass-panel { opacity: 0; visibility: hidden; }

        .start-text { color: #fff; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 4px 10px rgba(0,0,0,0.8); width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; margin: 0; }
        #history-title { font-size: 12px; font-weight: 900; letter-spacing: 3px; color: #fff; margin-bottom: 5px; text-shadow: 1px 1px 3px #000; }
        #history-viewport { width: 100%; flex: 1; overflow: hidden; position: relative; mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent); }
        
        /* МЕДЛЕННЫЙ КОНВЕЙЕР */
        #history-list { display: flex; flex-direction: column; align-items: center; width: 100%; position: absolute; left: 0; animation: conveyor-scroll 35s linear infinite; }
        @keyframes conveyor-scroll { 0% { transform: translateY(150px); } 100% { transform: translateY(-100%); } }
        .list-item { color: #fff; font-weight: 800; padding: 8px 0; width: 95%; text-align: center; text-transform: uppercase; text-shadow: 1px 1px 4px #000; border-bottom: 1px solid rgba(255,255,255,0.1); }

        .winner-plate { background: linear-gradient(145deg, #111, #000); padding: 40px 50px; border-radius: 50px; border: 3px solid #ffd700; text-align: center; backdrop-filter: blur(40px); width: 520px; box-sizing: border-box; box-shadow: 0 0 100px #000; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 600; opacity: 0; visibility: hidden; transition: 0.8s; }
        body.winner-active .winner-plate { opacity: 1; visibility: visible; }
        #winner-flavor { color: #ffd700; font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 900; letter-spacing: 8px; margin-bottom: 15px; display: block; text-transform: uppercase; }
        #winner-name { color: #fff; font-weight: 900; margin: 0; text-shadow: 0 0 40px rgba(255,215,0,0.6); line-height: 1.1; text-transform: uppercase; word-wrap: break-word; }

        #wheel-wrapper { position: relative; width: 620px; height: 620px; filter: drop-shadow(0 20px 60px rgba(0,0,0,0.7)); }
        #center-logo-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 112px; height: 112px; border-radius: 50%; border: 6px solid #1a1a1a; z-index: 60; overflow: hidden; background: #000; }
        #center-img { width: 100%; height: 100%; object-fit: cover; }
        #arrow-container { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); z-index: 100; width: 50px; height: 70px; }
        #arrow { width: 100%; height: 100%; transform-origin: 50% 10%; will-change: transform; }
        canvas { display: block; border-radius: 50%; }
    </style>
</head>
<body class="idle">

<div id="ui-column">
    <div id="start-node" class="glass-panel" onclick="startSpin()"><p class="start-text" id="st-label"></p></div>
    <div id="history-node" class="glass-panel"><div id="history-title">ПРИЗЫ</div><div id="history-viewport"><div id="history-list"></div></div></div>
</div>

<div class="winner-plate" onclick="resetToIdle()"><span id="winner-flavor"></span><p id="winner-name"></p></div>

<div id="main-layout">
    <div id="wheel-wrapper">
        <div id="center-logo-container"><img id="center-img" src=""></div>
        <div id="arrow-container"><svg id="arrow" viewBox="0 0 40 60"></svg></div>
        <canvas id="wheel" width="620" height="620"></canvas>
    </div>
</div>

<script>
    let options = [], history = [], settings = {}, lastUpdate = 0, lastRemote = 0;
    let angle = 0, spinning = false, lastTick = -1, arrowAngle = 0, spinAudio = new Audio();
    const tickSound = new Audio('https://www.soundjay.com/buttons/button-16.mp3');
    const canvas = document.getElementById('wheel'), ctx = canvas.getContext('2d'), arrowEl = document.getElementById('arrow');

    function parseGif(url) { if (!url || !url.includes('tenor.com/view/')) return url; return `https://media.tenor.com/${url.split('-').pop()}/tenor.gif`; }

    async function sync() {
        if (spinning) return;
        try {
            const res = await fetch('/api/data');
            const data = await res.json();
            if (data.lastUpdate > lastUpdate) {
                options = data.options; history = data.history || []; settings = data.settings || {}; lastUpdate = data.lastUpdate;
                const b = document.body; const s = settings;
                b.style.setProperty('--op', s.panelOpacity || 0.7);
                b.style.setProperty('--blur', s.panelBlur || 15);
                const sn = document.getElementById('start-node');
                sn.style.width = s.startBtnWidth+"px"; sn.style.height = s.startBtnHeight+"px"; sn.style.top = s.startBtnTop+"px";
                const sl = document.getElementById('st-label');
                sl.innerText = s.startBtnText; sl.style.fontSize = s.fontBtn+"px";
                const hn = document.getElementById('history-node');
                hn.style.width = s.historyWidth+"px"; hn.style.height = s.historyHeight+"px"; hn.style.top = s.historyTop+"px";
                document.getElementById('center-img').src = parseGif(s.centerImage);
                arrowEl.innerHTML = `<path d="M20 60 L40 10 Q40 0 30 0 L10 0 Q0 0 0 10 Z" fill="#fff" stroke="#000" stroke-width="2"/>`;
                if (s.remoteTrigger > lastRemote && lastRemote !== 0) startSpin();
                lastRemote = s.remoteTrigger;
                const hList = document.getElementById('history-list');
                const items = options.map(o => `<div class="list-item" style="font-size:${s.fontHist}px">${o}</div>`).join('');
                hList.innerHTML = items + items;
                draw();
            }
        } catch (e) {}
    }

    function draw() {
        if (!options.length) return;
        const arc = (2 * Math.PI) / options.length;
        ctx.clearRect(0, 0, 620, 620); ctx.save(); ctx.translate(310, 310);
        options.forEach((text, i) => {
            const startAngle = angle + i * arc;
            ctx.fillStyle = `hsl(${(i * 360) / options.length}, 75%, 50%)`;
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.arc(0, 0, 300, startAngle, startAngle + arc); ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 4; ctx.stroke();
            ctx.save(); ctx.rotate(startAngle + arc / 2);
            ctx.lineJoin = 'round'; ctx.strokeStyle = 'rgba(0,0,0,0.7)'; ctx.lineWidth = 2.5;
            ctx.font = `900 ${settings.fontWheel}px Inter`; ctx.textAlign = "center";
            let display = text.toUpperCase();
            if (ctx.measureText(display).width > 150) { while(ctx.measureText(display + "...").width > 150) display = display.slice(0, -1); display += "..."; }
            ctx.strokeText(display, 180, 5); ctx.fillStyle = "#fff"; ctx.fillText(display, 180, 5);
            ctx.restore();
        });
        ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 24; ctx.beginPath(); ctx.arc(0, 0, 290, 0, Math.PI * 2); ctx.stroke();
        ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(0, 0, 298, 0, Math.PI * 2); ctx.stroke();
        ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); ctx.arc(0, 0, 62, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }

    function mainLoop() {
        if (!spinning) { angle += 0.003; draw(); }
        arrowAngle += (-Math.min((spinning?0.05:0.003)*1300, 35) - arrowAngle) * 0.2;
        if (Math.abs(arrowAngle) < 0.1) arrowAngle = 0;
        arrowEl.style.transform = `rotate(${arrowAngle}deg)`;
        requestAnimationFrame(mainLoop);
    }

    function startSpin() {
        if (spinning || !options.length) return;
        if (settings.spinSound) { spinAudio.src = settings.spinSound; spinAudio.volume = 0.5; spinAudio.play().then(() => { spinAudio.pause(); spinAudio.currentTime = 0; }); }
        document.body.classList.remove('idle', 'winner-active');
        setTimeout(spin, 800);
    }

    function spin() {
        spinning = true;
        if (spinAudio.src) spinAudio.play().catch(()=>{});
        const start = performance.now(), duration = settings.spinTime || 12000, startAngle = angle;
        const totalRotation = (Math.PI * 50) + (Math.random() * Math.PI * 20);
        function update(now) {
            const t = Math.min((now - start) / duration, 1);
            angle = startAngle + totalRotation * (1 - Math.pow(1 - t, 5));
            const arc = (2 * Math.PI) / options.length;
            const idx = Math.floor(((angle + Math.PI * 1.5) % (Math.PI * 2)) / arc);
            if (idx !== lastTick) { tickSound.currentTime = 0; tickSound.play().catch(()=>{}); lastTick = idx; }
            draw(); if (t < 1) requestAnimationFrame(update);
            else { spinning = false; arrowAngle = 0; arrowEl.style.transform = `rotate(0deg)`; if (spinAudio) { let f = setInterval(() => { if(spinAudio.volume > 0.05) spinAudio.volume -= 0.05; else { spinAudio.pause(); clearInterval(f); } }, 50); } finish(); }
        }
        requestAnimationFrame(update);
    }

    async function finish() {
        const arc = (2 * Math.PI) / options.length;
        const normalized = (Math.PI * 1.5 - angle) % (Math.PI * 2);
        const idx = Math.floor((normalized < 0 ? normalized + Math.PI * 2 : normalized) / arc);
        const winner = options[idx];
        if (winner.includes("Джекпот")) {
            const end = Date.now() + 5000;
            (function frame() { confetti({ particleCount: 12, origin: { x: Math.random(), y: -0.2 }, colors: ['#ffd700'], shapes: ['circle'], gravity: 1.2, scalar: 2 }); if (Date.now() < end) requestAnimationFrame(frame); }());
        } else if (!winner.includes("Ничего")) { confetti({ particleCount: 180, spread: 80, origin: { y: 0.6 } }); }
        let flavor = "ВЫИГРЫШ!";
        for (let [p, t] of Object.entries(settings.flavorTexts || {})) { if (winner.includes(p)) flavor = t; }
        document.getElementById('winner-flavor').innerText = flavor;
        document.getElementById('winner-name').innerText = winner;
        const nameEl = document.getElementById('winner-name');
        let bs = 48; if (winner.length > 35) bs = 20; else if (winner.length > 25) bs = 28; else if (winner.length > 15) bs = 36;
        nameEl.style.fontSize = bs + "px";
        document.body.classList.add('winner-active');
        history.push(winner);
        if (settings.autoDelete) options.splice(idx, 1);
        const pass = localStorage.getItem('spin_pass') || "VikaWheel2024";
        await fetch('/api/data', { method: 'POST', body: JSON.stringify({ options, history, settings, password: pass }) });
        setTimeout(resetToIdle, 15000);
    }

    function resetToIdle() { if (spinning) return; document.body.classList.remove('winner-active'); setTimeout(() => { if (!spinning) document.body.classList.add('idle'); }, 1000); }
    setInterval(sync, 2000); sync(); requestAnimationFrame(mainLoop);
</script>
</body>
</html>
