<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Inter', sans-serif; background: transparent; }
        #main-layout { position: relative; transition: filter 1.2s ease, transform 1.2s ease; will-change: filter, transform; }
        body.idle #main-layout { filter: blur(10px) brightness(0.3); transform: scale(0.92); }
        body.winner-active #main-layout { filter: brightness(0.1) blur(25px); transform: scale(0.8); }
        #ui-column { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 500; pointer-events: none; transition: 0.8s; }
        body:not(.idle) #ui-column { opacity: 0; visibility: hidden; }
        .start-plate { background: rgba(255, 215, 0, 0.1); backdrop-filter: blur(15px); border: 3px solid #ffd700; padding: 35px 70px; border-radius: 30px; color: #fff; font-size: 50px; font-weight: 900; cursor: pointer; pointer-events: auto; animation: pulse 2.5s infinite; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 4px; }
        #history-container { width: 420px; height: 260px; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; overflow: hidden; pointer-events: auto; }
        #history-container::before { content: "ИСТОРИЯ ВЫИГРЫШЕЙ"; display: block; text-align: center; padding: 12px; font-size: 11px; color: #ffd700; letter-spacing: 4px; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 800; }
        #history-list { display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .history-item { color: rgba(255,255,255,0.8); font-size: 17px; font-weight: 700; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03); width: 100%; text-align: center; }
        #winner-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 600; cursor: pointer; opacity: 0; visibility: hidden; transition: 0.8s; }
        body.winner-active #winner-overlay { opacity: 1; visibility: visible; }
        #winner-overlay.closing { pointer-events: none; }
        .winner-plate { background: linear-gradient(145deg, #151515, #000); padding: 70px 100px; border-radius: 60px; border: 2px solid #ffd700; text-align: center; backdrop-filter: blur(40px); box-shadow: 0 0 100px rgba(0,0,0,1); }
        #winner-flavor { color: #ffd700; font-size: 24px; font-weight: 800; letter-spacing: 10px; margin-bottom: 25px; display: block; text-transform: uppercase; }
        #winner-name { color: #fff; font-size: 55px; font-weight: 900; margin: 0; text-shadow: 0 0 40px rgba(255,215,0,0.6); line-height: 1.2; text-transform: uppercase; }
        #wheel-wrapper { position: relative; width: 620px; height: 620px; filter: drop-shadow(0 20px 60px rgba(0,0,0,0.7)); }
        #center-logo-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 112px; height: 112px; border-radius: 50%; border: 6px solid #1a1a1a; z-index: 60; overflow: hidden; background: #000; }
        #arrow-container { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); z-index: 100; width: 45px; height: 65px; }
        #arrow { width: 100%; height: 100%; transform-origin: 50% 10%; will-change: transform; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.04); } 100% { transform: scale(1); } }
        canvas { display: block; border-radius: 50%; }
    </style>
</head>
<body class="idle">

<div id="ui-column">
    <div class="start-plate" onclick="startSpin()">Да-да, Нет-нет</div>
    <div id="history-container"><div id="history-list"></div></div>
</div>

<div id="winner-overlay" onclick="resetToIdle()">
    <div class="winner-plate">
        <span id="winner-flavor"></span>
        <p id="winner-name"></p>
    </div>
</div>

<div id="main-layout">
    <div id="wheel-wrapper">
        <div id="center-logo-container"><div class="tenor-gif-embed" data-postid="16943432931705998786" data-share-method="host" data-aspect-ratio="1" data-width="100%"></div></div>
        <div id="arrow-container"><svg id="arrow" viewBox="0 0 40 60"><path d="M20 60 L40 10 Q40 0 30 0 L10 0 Q0 0 0 10 Z" fill="#fff" stroke="#000" stroke-width="2"/></svg></div>
        <canvas id="wheel" width="620" height="620"></canvas>
    </div>
</div>

<script type="text/javascript" async src="https://tenor.com/embed.js"></script>

<script>
    let options = [], history = [], settings = {}, lastUpdate = 0;
    let angle = 0, spinning = false, lastTickIdx = -1;
    let arrowAngle = 0, autoResetTimer = null, spinAudio = new Audio();
    
    const tickSound = new Audio('https://www.soundjay.com/buttons/button-16.mp3');
    const canvas = document.getElementById('wheel'), ctx = canvas.getContext('2d');
    const arrowEl = document.getElementById('arrow');

    function getFlavorText(winner) {
        const text = winner.trim();
        if (text === "Ничего") return "Облом!";
        if (text === "Джекпот — 10 000 ₽") return "ДА ТЫ СЧАСТЛИВЧИК!";
        if (text.includes("баланс казино")) return "Ну хоть поиграешь)";
        if (text.toLowerCase().includes("бонуска") || text.includes("Беру повторку")) return "Ну хоть бонуску посмотрим!";
        if (text === "Делаю депозитное колесо на 5 000 ₽") return "Ни тебе, ни мне";
        if (text === "Модератор на 24 часа") return "Поработай немного!";
        return "ВЫИГРЫШ!";
    }

    async function syncData() {
        if (spinning) return;
        try {
            const res = await fetch('/api/data');
            const data = await res.json();
            if (data.lastUpdate > lastUpdate) {
                options = data.options; history = data.history || []; settings = data.settings;
                lastUpdate = data.lastUpdate;
                document.querySelector('.start-plate').innerText = settings.startBtnText || "Да-да, Нет-нет";
                updateHistoryUI(); draw();
            }
        } catch (e) {}
    }

    function updateHistoryUI() {
        document.getElementById('history-list').innerHTML = history.slice(-6).reverse().map(h => `<div class="history-item">${h}</div>`).join('');
    }

    function draw() {
        if (!options.length) return;
        const arc = (2 * Math.PI) / options.length;
        const centerX = 310, centerY = 310, radius = 300, innerHole = 60, textRadius = (radius + innerHole) / 2;
        ctx.clearRect(0, 0, 620, 620); ctx.save(); ctx.translate(centerX, centerY);
        options.forEach((text, i) => {
            ctx.fillStyle = `hsl(${(i * 360) / options.length}, 55%, 40%)`;
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.arc(0, 0, radius, angle + i * arc, angle + (i + 1) * arc); ctx.fill();
            ctx.save(); ctx.rotate(angle + i * arc + arc / 2);
            ctx.lineJoin = 'round'; ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 2.5;
            ctx.font = `900 14px Inter`; ctx.textAlign = "center";
            let display = text.toUpperCase();
            if (ctx.measureText(display).width > 150) { while(ctx.measureText(display + "...").width > 150) display = display.slice(0, -1); display += "..."; }
            ctx.strokeText(display, textRadius, 5); ctx.fillStyle = "#fff"; ctx.fillText(display, textRadius, 5);
            ctx.restore();
        });
        ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 24; ctx.beginPath(); ctx.arc(0, 0, radius - 10, 0, Math.PI * 2); ctx.stroke();
        ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(0, 0, radius - 2, 0, Math.PI * 2); ctx.stroke();
        ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); ctx.arc(0, 0, 62, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }

    function checkTick() {
        if (!options.length) return;
        const arc = (2 * Math.PI) / options.length;
        const idx = Math.floor(((angle + Math.PI * 1.5) % (Math.PI * 2)) / arc);
        if (idx !== lastTickIdx) { tickSound.currentTime = 0; tickSound.play().catch(()=>{}); lastTickIdx = idx; }
    }

    function mainLoop() {
        if (!spinning) { angle += 0.003; draw(); checkTick(); }
        arrowAngle += (-Math.min((spinning?0.05:0.003)*1300, 35) - arrowAngle) * 0.2;
        arrowEl.style.transform = `rotate(${arrowAngle}deg)`;
        requestAnimationFrame(mainLoop);
    }

    function startSpin() {
        if (spinning || !options.length) return;
        
        // РАЗБЛОКИРОВКА И ПОДГОТОВКА ЗВУКА
        if (settings.spinSound) {
            spinAudio.src = settings.spinSound;
            spinAudio.volume = 0.5;
            spinAudio.play().then(() => { spinAudio.pause(); spinAudio.currentTime = 0; });
        }

        document.body.classList.remove('idle', 'winner-active');
        document.getElementById('winner-overlay').classList.remove('closing');
        clearTimeout(autoResetTimer);
        setTimeout(spin, 800);
    }

    function spin() {
        spinning = true;
        if (spinAudio.src) spinAudio.play().catch(()=>{});

        const start = performance.now(), startAngle = angle, duration = 12000;
        const totalRotation = (Math.PI * 50) + (Math.random() * Math.PI * 20);
        let prevAngle = startAngle;
        
        function update(now) {
            const t = Math.min((now - start) / duration, 1);
            let ease = (t < 0.2) ? (t / 0.2) * (t / 0.2) * 0.1 : 0.1 + 0.9 * (1 - Math.pow(1 - (t - 0.2) / 0.8, 5));
            angle = startAngle + totalRotation * ease;
            checkTick(); draw();
            if (t < 1) requestAnimationFrame(update);
            else { 
                spinning = false; 
                let f = setInterval(() => { if(spinAudio.volume > 0.05) spinAudio.volume -= 0.05; else { spinAudio.pause(); clearInterval(f); } }, 50);
                finish(); 
            }
        }
        requestAnimationFrame(update);
    }

    async function finish() {
        const arc = (2 * Math.PI) / options.length;
        const normalized = (Math.PI * 1.5 - angle) % (Math.PI * 2);
        const idx = Math.floor((normalized < 0 ? normalized + Math.PI * 2 : normalized) / arc);
        const winner = options[idx];
        if (winner === "Джекпот — 10 000 ₽") {
            const end = Date.now() + 5000;
            const colors = ['#FFD700', '#D4AF37', '#FFDF00'];
            (function frame() { confetti({ particleCount: 12, origin: { x: Math.random(), y: -0.2 }, colors, shapes: ['circle'], gravity: 1.2, scalar: 2 }); if (Date.now() < end) requestAnimationFrame(frame); }());
        } else if (winner !== "Ничего") { confetti({ particleCount: 180, spread: 80, origin: { y: 0.6 } }); }
        document.getElementById('winner-flavor').innerText = getFlavorText(winner);
        document.getElementById('winner-name').innerText = winner;
        document.body.classList.add('winner-active');
        history.push(winner);
        await fetch('/api/data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ options, history, settings }) });
        updateHistoryUI();
        autoResetTimer = setTimeout(resetToIdle, 15000);
    }

    function resetToIdle() {
        if (spinning) return;
        const overlay = document.getElementById('winner-overlay');
        if (overlay.classList.contains('closing')) return;
        clearTimeout(autoResetTimer);
        overlay.classList.add('closing');
        document.body.classList.remove('winner-active');
        setTimeout(() => { if (!spinning) { document.body.classList.add('idle'); overlay.classList.remove('closing'); } }, 1000);
    }

    setInterval(syncData, 2000); syncData(); requestAnimationFrame(mainLoop);
</script>
</body>
</html>
