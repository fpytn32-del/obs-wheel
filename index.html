<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Inter', sans-serif; background: transparent; }
        #main-layout { position: relative; transition: 1.2s ease; }
        body.idle #main-layout { filter: blur(10px) brightness(0.3); transform: scale(0.92); }
        body.winner-active #main-layout { filter: brightness(0.1) blur(25px); transform: scale(0.8); }

        /* ЗОЛОТЫЕ ПАНЕЛИ */
        .glass-panel {
            position: fixed; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(212, 175, 55, var(--op, 0.7)) 0%, rgba(138, 109, 59, var(--op, 0.8)) 100%);
            backdrop-filter: blur(15px); border: 3px solid #fff; border-radius: 35px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.5); z-index: 500;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.8s ease;
        }
        body:not(.idle) .glass-panel { opacity: 0; visibility: hidden; }

        .start-plate { width: 500px; height: 110px; top: 100px; }
        .start-text { 
            color: #fff; font-size: var(--fbtn-size, 50px); font-weight: 900; text-transform: uppercase; 
            letter-spacing: 2px; text-shadow: 0 4px 10px rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center; width: 100%; height: 100%;
        }

        /* ИСТОРИЯ ВЫИГРЫШЕЙ */
        #history-container { width: 340px; height: 200px; top: 260px; overflow: hidden; }
        #history-title { font-size: var(--fhist-title-size, 11px); font-weight: 900; letter-spacing: 3px; color: #fff; margin-top: 10px; text-shadow: 1px 1px 3px #000; }
        #history-viewport { 
            width: 100%; height: 140px; overflow: hidden; position: relative; 
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
        }
        
        /* КОНВЕЙЕР: СНИЗУ ВВЕРХ ЧЕРЕЗ ВСЁ ОКНО */
        #history-list { 
            display: flex; flex-direction: column; align-items: center; width: 100%; 
            position: absolute; left: 0;
            animation: conveyor-scroll 15s linear infinite; 
        }
        @keyframes conveyor-scroll { 
            0% { transform: translateY(140px); } /* Начало за нижней границей */
            100% { transform: translateY(-100%); } /* Конец за верхней границей */
        }

        .history-item { 
            color: #fff; font-size: var(--fhist-size, 15px); font-weight: 800; 
            padding: 8px 0; width: 90%; text-align: center; text-transform: uppercase; text-shadow: 1px 1px 4px #000; 
        }

        /* ПОБЕДА */
        #winner-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 600; cursor: pointer; opacity: 0; visibility: hidden; transition: 0.8s; }
        body.winner-active #winner-overlay { opacity: 1; visibility: visible; }
        .winner-plate { background: linear-gradient(145deg, #111, #000); padding: 40px 50px; border-radius: 50px; border: 3px solid #ffd700; text-align: center; backdrop-filter: blur(40px); width: 520px; box-sizing: border-box; }
        
        #winner-flavor { color: #ffd700; font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 900; letter-spacing: 8px; margin-bottom: 15px; display: block; text-transform: uppercase; }
        #winner-name { color: #fff; font-weight: 900; margin: 0; text-shadow: 0 0 40px rgba(255,215,0,0.6); line-height: 1.1; text-transform: uppercase; word-wrap: break-word; }

        #wheel-wrapper { position: relative; width: 620px; height: 620px; filter: drop-shadow(0 20px 60px rgba(0,0,0,0.7)); }
        #center-logo-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 112px; height: 112px; border-radius: 50%; border: 6px solid #1a1a1a; z-index: 60; overflow: hidden; background: #000; }
        #center-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        #arrow-container { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); z-index: 100; width: 50px; height: 70px; }
        #arrow { width: 100%; height: 100%; transform-origin: 50% 10%; will-change: transform; }
        canvas { display: block; border-radius: 50%; }
    </style>
</head>
<body class="idle">

<div id="ui-column">
    <div id="start-node" class="start-plate glass-panel" onclick="startSpin()"><p class="start-text">Да-да, Нет-нет</p></div>
    <div id="history-node" class="glass-panel" id="history-container">
        <div id="history-title">ИСТОРИЯ ВЫИГРЫШЕЙ</div>
        <div id="history-viewport"><div id="history-list"></div></div>
    </div>
</div>

<div id="winner-overlay" onclick="resetToIdle()"><div class="winner-plate"><span id="winner-flavor"></span><p id="winner-name"></p></div></div>

<div id="main-layout">
    <div id="wheel-wrapper">
        <div id="center-logo-container"><img id="center-img" src=""></div>
        <div id="arrow-container"><svg id="arrow" viewBox="0 0 40 60"></svg></div>
        <canvas id="wheel" width="620" height="620"></canvas>
    </div>
</div>

<script>
    let options = [], history = [], settings = {}, lastUpdate = 0, lastRemoteTrigger = 0;
    let angle = 0, spinning = false, lastTickIdx = -1, arrowAngle = 0, spinAudio = new Audio();
    const tickSound = new Audio('https://www.soundjay.com/buttons/button-16.mp3');
    const canvas = document.getElementById('wheel'), ctx = canvas.getContext('2d'), arrowEl = document.getElementById('arrow');

    function parseGifUrl(url) {
        if (!url) return "";
        if (url.includes('tenor.com/view/')) {
            const parts = url.split('-');
            const id = parts[parts.length - 1];
            if (id) return `https://media.tenor.com/${id}/tenor.gif`;
        }
        return url;
    }

    function getArrowPath(type) {
        if(type === 'drop') return 'M20 60 C40 40 40 0 20 0 C0 0 0 40 20 60 Z';
        if(type === 'sharp') return 'M20 60 L40 0 L20 10 L0 0 Z';
        return 'M20 60 L40 10 Q40 0 30 0 L10 0 Q0 0 0 10 Z';
    }

    async function syncData() {
        if (spinning) return;
        try {
            const res = await fetch('/api/data');
            const data = await res.json();
            if (data.lastUpdate > lastUpdate) {
                options = data.options; history = data.history || []; settings = data.settings; lastUpdate = data.lastUpdate;
                
                const b = document.body;
                b.style.setProperty('--fbtn-size', settings.fontBtn + 'px');
                b.style.setProperty('--fhist-size', settings.fontHist + 'px');
                b.style.setProperty('--fhist-title-size', (settings.fontHistTitle || 11) + 'px');
                
                document.querySelector('.start-text').innerText = settings.startBtnText;
                document.getElementById('history-title').innerText = settings.historyTitle || "ИСТОРИЯ ВЫИГРЫШЕЙ";
                
                const finalImgUrl = parseGifUrl(settings.centerImage);
                const img = document.getElementById('center-img');
                if (img.src !== finalImgUrl) img.src = finalImgUrl;

                arrowEl.innerHTML = `<path d="${getArrowPath(settings.arrowType)}" fill="${settings.arrowColor}" stroke="#fff" stroke-width="2"/>`;

                if (settings.remoteTrigger > lastRemoteTrigger && lastRemoteTrigger !== 0) startSpin();
                lastRemoteTrigger = settings.remoteTrigger;
                updateHistoryUI(); draw();
            }
        } catch (e) {}
    }

    function updateHistoryUI() {
        const list = document.getElementById('history-list');
        const itemsHTML = (history || []).slice().reverse().map(h => `<div class="history-item">${h}</div>`).join('');
        list.innerHTML = itemsHTML + itemsHTML;
    }

    function draw() {
        if (!options.length) return;
        const arc = (2 * Math.PI) / options.length;
        const centerX = 310, centerY = 310, radius = 300, innerHole = 60, textRadius = (radius + innerHole) / 2;
        ctx.clearRect(0, 0, 620, 620); ctx.save(); ctx.translate(centerX, centerY);
        options.forEach((text, i) => {
            ctx.fillStyle = `hsl(${(i * 360) / options.length}, 55%, 40%)`;
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.arc(0, 0, radius, angle + i * arc, angle + (i + 1) * arc); ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 4; ctx.stroke();
            ctx.save(); ctx.rotate(angle + i * arc + arc / 2);
            ctx.lineJoin = 'round'; ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 2.5;
            ctx.font = `900 ${settings.fontWheel}px Inter`; ctx.textAlign = "center";
            let display = text.toUpperCase();
            if (ctx.measureText(display).width > 150) { while(ctx.measureText(display + "...").width > 150) display = display.slice(0, -1); display += "..."; }
            ctx.strokeText(display, textRadius, 5); ctx.fillStyle = "#fff"; ctx.fillText(display, textRadius, 5);
            ctx.restore();
        });
        ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 24; ctx.beginPath(); ctx.arc(0, 0, radius - 10, 0, Math.PI * 2); ctx.stroke();
        ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(0, 0, radius - 2, 0, Math.PI * 2); ctx.stroke();
        ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); ctx.arc(0, 0, 62, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }

    function mainLoop() {
        if (!spinning) { angle += 0.003; draw(); }
        arrowAngle += (-Math.min((spinning?0.05:0.003)*1300, 35) - arrowAngle) * 0.2;
        arrowEl.style.transform = `rotate(${arrowAngle}deg)`;
        requestAnimationFrame(mainLoop);
    }

    function startSpin() {
        if (spinning || !options.length) return;
        if (settings.spinSound) { spinAudio.src = settings.spinSound; spinAudio.volume = 0.5; spinAudio.play().then(() => { spinAudio.pause(); spinAudio.currentTime = 0; }); }
        document.body.classList.remove('idle', 'winner-active');
        setTimeout(spin, 800);
    }

    function spin() {
        spinning = true;
        if (spinAudio.src) spinAudio.play().catch(()=>{});
        const start = performance.now(), startAngle = angle, duration = settings.spinTime || 12000;
        const totalRotation = (Math.PI * 50) + (Math.random() * Math.PI * 20);
        let prevAngle = startAngle;
        function update(now) {
            const t = Math.min((now - start) / duration, 1);
            let ease = (t < 0.2) ? (t / 0.2) * (t / 0.2) * 0.1 : 0.1 + 0.9 * (1 - Math.pow(1 - (t - 0.2) / 0.8, 5));
            angle = startAngle + totalRotation * ease;
            const velocity = angle - prevAngle; prevAngle = angle;
            const arc = (2 * Math.PI) / options.length;
            const idx = Math.floor(((angle + Math.PI * 1.5) % (Math.PI * 2)) / arc);
            if (idx !== lastTickIdx) { tickSound.currentTime = 0; tickSound.play().catch(()=>{}); lastTickIdx = idx; }
            draw(); 
            if (t < 1) requestAnimationFrame(update);
            else { spinning = false; arrowAngle = 0; arrowEl.style.transform = `rotate(0deg)`; if (spinAudio) { let f = setInterval(() => { if(spinAudio.volume > 0.05) spinAudio.volume -= 0.05; else { spinAudio.pause(); clearInterval(f); } }, 50); } finish(); }
        }
        requestAnimationFrame(update);
    }

    async function finish() {
        const arc = (2 * Math.PI) / options.length;
        const normalized = (Math.PI * 1.5 - angle) % (Math.PI * 2);
        const idx = Math.floor((normalized < 0 ? normalized + Math.PI * 2 : normalized) / arc);
        const winner = options[idx];
        if (winner.includes("Джекпот")) {
            const end = Date.now() + 5000;
            const colors = ['#FFD700', '#D4AF37', '#FFDF00'];
            (function frame() { confetti({ particleCount: 12, origin: { x: Math.random(), y: -0.2 }, colors, shapes: ['circle'], gravity: 1.2, scalar: 2 }); if (Date.now() < end) requestAnimationFrame(frame); }());
        } else if (!winner.includes("Ничего")) { confetti({ particleCount: 180, spread: 80, origin: { y: 0.6 } }); }
        
        let flavor = "ВЫИГРЫШ!";
        for (let [p, t] of Object.entries(settings.flavorTexts || {})) { if (winner.includes(p)) flavor = t; }
        document.getElementById('winner-flavor').innerText = flavor;
        document.getElementById('winner-name').innerText = winner;
        const nameEl = document.getElementById('winner-name');
        let bs = 48; if (winner.length > 35) bs = 18; else if (winner.length > 25) bs = 24; else if (winner.length > 15) bs = 34;
        nameEl.style.fontSize = bs + "px";
        document.body.classList.add('winner-active');
        
        history.push(winner);
        if (settings.autoDelete) options.splice(idx, 1);
        const pass = localStorage.getItem('spin_pass') || "VikaWheel2024";
        await fetch('/api/data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ options, history, settings, password: pass }) });
        autoResetTimer = setTimeout(resetToIdle, 15000);
    }

    function resetToIdle() {
        if (spinning) return;
        document.body.classList.remove('winner-active');
        setTimeout(() => { if (!spinning) document.body.classList.add('idle'); }, 1000);
    }
    setInterval(syncData, 2000); syncData(); requestAnimationFrame(mainLoop);
</script>
</body>
</html>
