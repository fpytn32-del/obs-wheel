<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Inter', sans-serif; background: transparent; }
        
        #main-layout { position: relative; transition: filter 1.2s ease, transform 1.2s ease; }
        body.idle #main-layout { filter: blur(10px) brightness(0.3); transform: scale(0.92); }
        body.winner-active #main-layout { filter: brightness(0.1) blur(25px); transform: scale(0.8); }

        /* КОЛОНКА УПРАВЛЕНИЯ */
        #ui-column {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 500; pointer-events: none; transition: 0.8s;
        }
        body:not(.idle) #ui-column { opacity: 0; visibility: hidden; }

        /* --- ПРЕМИАЛЬНЫЕ ПАНЕЛИ (ЗОЛОТО + RGB) --- */
        .premium-panel {
            position: relative;
            border-radius: 35px;
            padding: 2.5px; /* ТОНКАЯ RGB ОБВОДКА */
            background: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            background-size: 400% 400%;
            animation: rgb-move 4s linear infinite;
            box-shadow: 0 15px 45px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        @keyframes rgb-move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .panel-inner {
            /* ПРОЗРАЧНОЕ НО НАСЫЩЕННОЕ ЗОЛОТО */
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.6) 0%, rgba(255, 215, 0, 0.5) 50%, rgba(138, 109, 59, 0.6) 100%);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* КНОПКА ЗАПУСКА */
        .start-plate { width: 500px; height: 120px; cursor: pointer; pointer-events: auto; margin-bottom: 30px; transition: transform 0.2s; }
        .start-plate:active { transform: scale(0.96); }

        .start-text {
            color: #fff; font-size: 50px; font-weight: 900; text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5), -1px -1px 0 rgba(0,0,0,0.7), 1px -1px 0 rgba(0,0,0,0.7), -1px 1px 0 rgba(0,0,0,0.7), 1px 1px 0 rgba(0,0,0,0.7);
        }

        /* ИСТОРИЯ ВЫИГРЫШЕЙ (КОМПАКТНАЯ) */
        #history-container { 
            width: 340px; /* МЕНЬШЕ ШИРИНА */
            height: 200px; /* МЕНЬШЕ ВЫСОТА */
            pointer-events: auto; 
        }
        #history-title { 
            font-size: 11px; font-weight: 900; letter-spacing: 3px; color: #fff; 
            margin-top: 8px; margin-bottom: 3px; text-shadow: 1px 1px 3px #000; z-index: 10; 
        }

        #history-viewport { 
            width: 100%; height: 135px; overflow: hidden; position: relative; 
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
        }

        #history-list {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; position: absolute; top: 0; left: 0;
            animation: conveyor-scroll 15s linear infinite;
        }

        @keyframes conveyor-scroll {
            from { transform: translateY(0); }
            to { transform: translateY(-50%); }
        }

        .history-item { 
            color: #fff; font-size: 15px; font-weight: 800; /* МЕНЬШЕ ШРИФТ */
            padding: 8px 0; width: 90%; text-align: center;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
        }

        /* ПОБЕДНАЯ ПЛАШКА */
        #winner-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 600; cursor: pointer; opacity: 0; visibility: hidden; transition: 0.8s; }
        body.winner-active #winner-overlay { opacity: 1; visibility: visible; }
        .winner-plate { background: linear-gradient(145deg, #111, #000); padding: 40px 50px; border-radius: 50px; border: 3px solid #ffd700; text-align: center; backdrop-filter: blur(40px); box-shadow: 0 0 100px rgba(0,0,0,1); width: 520px; box-sizing: border-box; }
        #winner-flavor { color: #ffd700; font-size: 20px; font-weight: 800; letter-spacing: 8px; margin-bottom: 15px; display: block; text-transform: uppercase; }
        #winner-name { color: #fff; font-weight: 900; margin: 0; text-shadow: 0 0 40px rgba(255,215,0,0.6); line-height: 1.1; text-transform: uppercase; word-wrap: break-word; }

        /* КОЛЕСО */
        #wheel-wrapper { position: relative; width: 620px; height: 620px; filter: drop-shadow(0 20px 60px rgba(0,0,0,0.7)); }
        #center-logo-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 112px; height: 112px; border-radius: 50%; border: 6px solid #1a1a1a; z-index: 60; overflow: hidden; background: #000; }
        #arrow-container { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); z-index: 100; width: 45px; height: 65px; }
        #arrow { width: 100%; height: 100%; transform-origin: 50% 10%; will-change: transform; }
        #center-img { width: 100%; height: 100%; object-fit: cover; }
        canvas { display: block; border-radius: 50%; }
    </style>
</head>
<body class="idle">

<div id="ui-column">
    <div class="start-plate premium-panel" onclick="startSpin()">
        <div class="panel-inner">
            <div class="start-text">Да-да, Нет-нет</div>
        </div>
    </div>
    
    <div id="history-container" class="premium-panel">
        <div class="panel-inner">
            <div id="history-title">ИСТОРИЯ ВЫИГРЫШЕЙ</div>
            <div id="history-viewport">
                <div id="history-list"></div>
            </div>
        </div>
    </div>
</div>

<div id="winner-overlay" onclick="resetToIdle()">
    <div class="winner-plate">
        <span id="winner-flavor"></span>
        <p id="winner-name"></p>
    </div>
</div>

<div id="main-layout">
    <div id="wheel-wrapper">
        <div id="center-logo-container"><img id="center-img" src=""></div>
        <div id="arrow-container">
            <svg id="arrow" viewBox="0 0 40 60">
                <path d="M20 60 L40 10 Q40 0 30 0 L10 0 Q0 0 0 10 Z" fill="#fff" stroke="#000" stroke-width="2"/>
            </svg>
        </div>
        <canvas id="wheel" width="620" height="620"></canvas>
    </div>
</div>

<script>
    let options = [], history = [], settings = {}, lastUpdate = 0;
    let angle = 0, spinning = false, lastTickIdx = -1, arrowAngle = 0;
    let autoResetTimer = null, spinAudio = new Audio();
    const tickSound = new Audio('https://www.soundjay.com/buttons/button-16.mp3');
    const canvas = document.getElementById('wheel'), ctx = canvas.getContext('2d');
    const arrowEl = document.getElementById('arrow');

    async function syncData() {
        if (spinning) return;
        try {
            const res = await fetch('/api/data');
            const data = await res.json();
            if (data.lastUpdate > lastUpdate) {
                options = data.options;
                settings = data.settings;
                lastUpdate = data.lastUpdate;
                document.querySelector('.start-text').innerText = settings.startBtnText || "Да-да, Нет-нет";
                document.getElementById('center-img').src = settings.centerImage;
                if (JSON.stringify(history) !== JSON.stringify(data.history)) {
                    history = data.history || [];
                    updateHistoryUI();
                }
                draw();
            }
        } catch (e) {}
    }

    function updateHistoryUI() {
        const list = document.getElementById('history-list');
        if (!history.length) {
            list.innerHTML = '<div class="history-item">ОЖИДАНИЕ...</div>';
            return;
        }
        const itemsHTML = history.slice().reverse().map(h => `<div class="history-item">${h}</div>`).join('');
        list.innerHTML = itemsHTML + itemsHTML;
        const duration = Math.max(12, history.length * 3.5);
        list.style.animationDuration = duration + 's';
    }

    function draw() {
        if (!options.length) return;
        const arc = (2 * Math.PI) / options.length;
        const centerX = 310, centerY = 310, radius = 300, innerHole = 60, textRadius = (radius + innerHole) / 2;
        ctx.clearRect(0, 0, 620, 620); ctx.save(); ctx.translate(centerX, centerY);
        options.forEach((text, i) => {
            ctx.fillStyle = `hsl(${(i * 360) / options.length}, 55%, 40%)`;
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.arc(0, 0, radius, angle + i * arc, angle + (i + 1) * arc); ctx.fill();
            ctx.save(); ctx.rotate(angle + i * arc + arc / 2);
            ctx.lineJoin = 'round'; ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 2.5;
            ctx.font = `900 14px Inter`; ctx.textAlign = "center";
            let display = text.toUpperCase();
            if (ctx.measureText(display).width > 150) { while(ctx.measureText(display + "...").width > 150) display = display.slice(0, -1); display += "..."; }
            ctx.strokeText(display, textRadius, 5); ctx.fillStyle = "#fff"; ctx.fillText(display, textRadius, 5);
            ctx.restore();
        });
        ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 24; ctx.beginPath(); ctx.arc(0, 0, radius - 10, 0, Math.PI * 2); ctx.stroke();
        ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(0, 0, radius - 2, 0, Math.PI * 2); ctx.stroke();
        ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); ctx.arc(0, 0, 62, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }

    function updateArrow(vel) {
        let target = -Math.min(vel * 1400, 35); 
        let lerpFactor = vel < 0.005 ? 0.3 : 0.15;
        arrowAngle += (target - arrowAngle) * lerpFactor;
        if (Math.abs(arrowAngle) < 0.1) arrowAngle = 0;
        arrowEl.style.transform = `rotate(${arrowAngle}deg)`;
    }

    function mainLoop() {
        if (!spinning) { 
            let vel = 0.003; angle += vel; draw(); 
            const arc = (2 * Math.PI) / options.length;
            const idx = Math.floor(((angle + Math.PI * 1.5) % (Math.PI * 2)) / arc);
            if (idx !== lastTickIdx) { tickSound.currentTime = 0; tickSound.play().catch(()=>{}); lastTickIdx = idx; }
            updateArrow(vel);
        }
        requestAnimationFrame(mainLoop);
    }

    function startSpin() {
        if (spinning || !options.length) return;
        if (settings.spinSound) { spinAudio.src = settings.spinSound; spinAudio.volume = 0.5; spinAudio.play().then(() => { spinAudio.pause(); spinAudio.currentTime = 0; }); }
        document.body.classList.remove('idle', 'winner-active');
        clearTimeout(autoResetTimer);
        setTimeout(spin, 800);
    }

    function spin() {
        spinning = true;
        if (spinAudio.src) spinAudio.play().catch(()=>{});
        const start = performance.now(), startAngle = angle, duration = settings.spinTime || 12000;
        const totalRotation = (Math.PI * 50) + (Math.random() * Math.PI * 20);
        let prevAngle = startAngle;
        function update(now) {
            const t = Math.min((now - start) / duration, 1);
            let ease = (t < 0.2) ? (t / 0.2) * (t / 0.2) * 0.1 : 0.1 + 0.9 * (1 - Math.pow(1 - (t - 0.2) / 0.8, 5));
            angle = startAngle + totalRotation * ease;
            const velocity = angle - prevAngle; prevAngle = angle;
            const arc = (2 * Math.PI) / options.length;
            const idx = Math.floor(((angle + Math.PI * 1.5) % (Math.PI * 2)) / arc);
            if (idx !== lastTickIdx) { tickSound.currentTime = 0; tickSound.play().catch(()=>{}); lastTickIdx = idx; }
            draw(); updateArrow(velocity);
            if (t < 1) requestAnimationFrame(update);
            else { spinning = false; arrowAngle = 0; arrowEl.style.transform = `rotate(0deg)`; if (spinAudio) { let f = setInterval(() => { if(spinAudio.volume > 0.05) spinAudio.volume -= 0.05; else { spinAudio.pause(); clearInterval(f); } }, 50); } finish(); }
        }
        requestAnimationFrame(update);
    }

    async function finish() {
        const arc = (2 * Math.PI) / options.length;
        const normalized = (Math.PI * 1.5 - angle) % (Math.PI * 2);
        const idx = Math.floor((normalized < 0 ? normalized + Math.PI * 2 : normalized) / arc);
        const winner = options[idx];
        if (winner === "Джекпот — 10 000 ₽") {
            const end = Date.now() + 5000;
            const colors = ['#FFD700', '#D4AF37', '#FFDF00'];
            (function frame() { confetti({ particleCount: 12, origin: { x: Math.random(), y: -0.2 }, colors, shapes: ['circle'], gravity: 1.2, scalar: 2 }); if (Date.now() < end) requestAnimationFrame(frame); }());
        } else if (winner !== "Ничего") { confetti({ particleCount: 180, spread: 80, origin: { y: 0.6 } }); }
        let flavor = "ВЫИГРЫШ!";
        for (let [p, t] of Object.entries(settings.flavorTexts || {})) { if (winner.includes(p)) flavor = t; }
        document.getElementById('winner-flavor').innerText = flavor;
        document.getElementById('winner-name').innerText = winner;
        const nameEl = document.getElementById('winner-name');
        let baseSize = 48;
        if (winner.length > 35) baseSize = 18;
        else if (winner.length > 25) baseSize = 24;
        else if (winner.length > 15) baseSize = 34;
        nameEl.style.fontSize = baseSize + "px";
        document.body.classList.add('winner-active');
        history.push(winner);
        const pass = localStorage.getItem('spin_pass') || "VikaWheel2024";
        await fetch('/api/data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ options, history, settings, password: pass }) });
        updateHistoryUI();
        autoResetTimer = setTimeout(resetToIdle, 15000);
    }

    function resetToIdle() {
        if (spinning) return;
        document.body.classList.remove('winner-active');
        setTimeout(() => { if (!spinning) document.body.classList.add('idle'); }, 1000);
    }
    setInterval(syncData, 2000); syncData(); requestAnimationFrame(mainLoop);
</script>
</body>
</html>
