<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Wheel Master Admin PRO</title>
    <style>
        body { font-family: sans-serif; background: #080808; color: #eee; padding: 20px; display: flex; justify-content: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; max-width: 1300px; width: 100%; }
        .card { background: #121212; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        h3 { color: #ffd700; text-transform: uppercase; font-size: 11px; border-bottom: 1px solid #222; padding-bottom: 8px; margin: 0 0 15px 0; }
        label { display: block; margin: 8px 0 3px; font-size: 9px; color: #666; font-weight: 800; text-transform: uppercase; }
        textarea, input, select { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 6px; box-sizing: border-box; font-size: 12px; }
        button { width: 100%; padding: 12px; background: #ffd700; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .spin-btn { background: #ff4757 !important; color: #fff !important; font-size: 16px; height: 50px; }
        .flavor-row { display: flex; gap: 5px; margin-bottom: 5px; }
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #ffd700; color: #000; padding: 15px 40px; border-radius: 50px; font-weight: 900; transition: 0.5s; z-index: 1000; }
        #toast.show { top: 30px; }
    </style>
</head>
<body>
    <div id="toast">СОХРАНЕНО!</div>

    <div id="login-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#080808; z-index:2000; display:flex; justify-content:center; align-items:center;">
        <div class="card" style="width:300px; text-align:center;">
            <h3>Security Access</h3>
            <input type="password" id="pass-input" placeholder="Пароль...">
            <button onclick="tryLogin()">ВОЙТИ</button>
        </div>
    </div>

    <div class="grid" id="main-ui" style="display:none;">
        <div class="card">
            <button class="spin-btn" onclick="triggerRemoteSpin()">🚀 ЗАПУСТИТЬ КОЛЕСО</button>
            <h3>📝 Основное</h3>
            <textarea id="opts" style="height:100px;"></textarea>
            <label>Текст кнопки / Заголовок истории:</label>
            <div class="flavor-row"><input type="text" id="btn-text"><input type="text" id="hist-title-text"></div>
            <label>Заголовок призового фонда:</label>
            <input type="text" id="prize-title-text">
            <label>Время вращения (мс) / Гифка центра:</label>
            <div class="flavor-row"><input type="number" id="spin-time"><input type="text" id="center-img"></div>
            <label><input type="checkbox" id="auto-del"> Удалять при выигрыше</label>
        </div>

        <div class="card">
            <h3>📏 Размеры и Позиции</h3>
            <label>Кнопка (W x H x Y):</label>
            <div class="flavor-row"><input type="number" id="btn-w"><input type="number" id="btn-h"><input type="number" id="btn-y"></div>
            <label>История (W x H x Y):</label>
            <div class="flavor-row"><input type="number" id="hist-w"><input type="number" id="hist-h"><input type="number" id="hist-y"></div>
            <label>Призовой фонд (W x H x Y):</label>
            <div class="flavor-row"><input type="number" id="prize-w"><input type="number" id="prize-h"><input type="number" id="prize-y"></div>
            <label><input type="checkbox" id="show-prizes"> Показать список призов</label>
            
            <h3>🏹 Дракон</h3>
            <label>URL Дракона / Размер:</label>
            <div class="flavor-row"><input type="text" id="dragon-img"><input type="number" id="dragon-size"></div>
            <label>Позиция X / Y %:</label>
            <div class="flavor-row"><input type="number" id="dragon-x"><input type="number" id="dragon-y"></div>
        </div>

        <div class="card">
            <h3>✏️ Шрифты</h3>
            <label>Размер Колеса / Кнопки / Истории:</label>
            <div class="flavor-row"><input type="number" id="f-wheel"><input type="number" id="f-btn"><input type="number" id="f-hist"></div>
            <label>Заголовок Истории / Заголовок Призов:</label>
            <div class="flavor-row"><input type="number" id="f-hist-t"><input type="number" id="f-prize-t"></div>

            <h3>💬 Фразы</h3>
            <div id="flavor-list" style="max-height:100px; overflow-y:auto; margin-bottom:5px;"></div>
            <button style="background:#222; color:#fff; font-size:9px;" onclick="addFlavor()">+ Добавить фразу</button>
            <button onclick="save()" style="background:#fff; color:#000;">СОХРАНИТЬ ВСЁ</button>
            <button onclick="clearHistory()" style="background:#333; color:#777; font-size:9px; margin-top:20px;">Очистить историю</button>
        </div>
    </div>

<script>
    let fullData = { options: [], settings: {}, history: [] };
    let currentPass = localStorage.getItem('spin_pass') || "";

    async function tryLogin() {
        const input = document.getElementById('pass-input').value;
        if (input) currentPass = input;
        const res = await fetch('/api/data');
        if (res.status === 200) {
            fullData = await res.json();
            localStorage.setItem('spin_pass', currentPass);
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-ui').style.display = 'grid';
            fillFields();
        } else { alert("Ошибка пароля"); }
    }

    function fillFields() {
        const s = fullData.settings || {};
        document.getElementById('opts').value = (fullData.options || []).join('\n');
        document.getElementById('btn-text').value = s.startBtnText || "Да-да, Нет-нет";
        document.getElementById('hist-title-text').value = s.historyTitle || "ИСТОРИЯ";
        document.getElementById('prize-title-text').value = s.prizeListTitle || "ПРИЗЫ";
        document.getElementById('spin-time').value = s.spinTime || 12000;
        document.getElementById('auto-del').checked = s.autoDelete || false;
        document.getElementById('center-img').value = s.centerImage || "";
        document.getElementById('btn-w').value = s.startBtnWidth || 500;
        document.getElementById('btn-h').value = s.startBtnHeight || 110;
        document.getElementById('btn-y').value = s.startBtnTop || 100;
        document.getElementById('hist-w').value = s.historyWidth || 340;
        document.getElementById('hist-h').value = s.historyHeight || 200;
        document.getElementById('hist-y').value = s.historyTop || 260;
        document.getElementById('prize-w').value = s.prizeListWidth || 340;
        document.getElementById('prize-h').value = s.prizeListHeight || 200;
        document.getElementById('prize-y').value = s.prizeListTop || 500;
        document.getElementById('show-prizes').checked = s.showPrizeList || false;
        document.getElementById('dragon-img').value = s.dragonImg || "";
        document.getElementById('dragon-x').value = s.dragonX || 50;
        document.getElementById('dragon-y').value = s.dragonY || 50;
        document.getElementById('dragon-size').value = s.dragonSize || 200;
        document.getElementById('f-wheel').value = s.fontWheel || 14;
        document.getElementById('f-btn').value = s.fontBtn || 50;
        document.getElementById('f-hist').value = s.fontHist || 15;
        document.getElementById('f-hist-t').value = s.fontHistTitle || 11;
        document.getElementById('f-prize-t').value = s.fontPrizeTitle || 11;

        const fList = document.getElementById('flavor-list'); fList.innerHTML = '';
        for (let [p, t] of Object.entries(s.flavorTexts || {})) fList.innerHTML += `<div class="flavor-row"><input value="${p}" class="f-p"><input value="${t}" class="f-t"></div>`;
    }

    async function save(silent = false) {
        const s = fullData.settings;
        fullData.options = document.getElementById('opts').value.split('\n').filter(x => x.trim());
        s.startBtnText = document.getElementById('btn-text').value;
        s.historyTitle = document.getElementById('hist-title-text').value;
        s.prizeListTitle = document.getElementById('prize-title-text').value;
        s.spinTime = parseInt(document.getElementById('spin-time').value);
        s.centerImage = document.getElementById('center-img').value;
        s.autoDelete = document.getElementById('auto-del').checked;
        s.startBtnWidth = parseInt(document.getElementById('btn-w').value);
        s.startBtnHeight = parseInt(document.getElementById('btn-h').value);
        s.startBtnTop = parseInt(document.getElementById('btn-y').value);
        s.historyWidth = parseInt(document.getElementById('hist-w').value);
        s.historyHeight = parseInt(document.getElementById('hist-h').value);
        s.historyTop = parseInt(document.getElementById('hist-y').value);
        s.prizeListWidth = parseInt(document.getElementById('prize-w').value);
        s.prizeListHeight = parseInt(document.getElementById('prize-h').value);
        s.prizeListTop = parseInt(document.getElementById('prize-y').value);
        s.showPrizeList = document.getElementById('show-prizes').checked;
        s.dragonImg = document.getElementById('dragon-img').value;
        s.dragonX = parseInt(document.getElementById('dragon-x').value);
        s.dragonY = parseInt(document.getElementById('dragon-y').value);
        s.dragonSize = parseInt(document.getElementById('dragon-size').value);
        s.fontWheel = parseInt(document.getElementById('f-wheel').value);
        s.fontBtn = parseInt(document.getElementById('f-btn').value);
        s.fontHist = parseInt(document.getElementById('f-hist').value);
        s.fontHistTitle = parseInt(document.getElementById('f-hist-t').value);
        s.fontPrizeTitle = parseInt(document.getElementById('f-prize-t').value);

        const f = {}; document.querySelectorAll('.flavor-row').forEach(r => { if(r.querySelector('.f-p').value) f[r.querySelector('.f-p').value] = r.querySelector('.f-t').value; });
        s.flavorTexts = f; fullData.password = currentPass;

        const res = await fetch('/api/data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(fullData) });
        if(res.status === 200) { if(!silent) { document.getElementById('toast').classList.add('show'); setTimeout(()=>document.getElementById('toast').classList.remove('show'),2000); } }
    }
    function addFlavor() { document.getElementById('flavor-list').innerHTML += `<div class="flavor-row"><input class="f-p"><input class="f-t"></div>`; }
    async function triggerRemoteSpin() { fullData.settings.remoteTrigger = Date.now(); await save(true); }
    async function clearHistory() { fullData.history = []; await save(true); location.reload(); }
    if (currentPass) tryLogin();
</script>
</body>
</html>
