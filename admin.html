<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Wheel Master Admin PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #080808; color: #eee; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; max-width: 1400px; width: 100%; }
        .card { background: #121212; padding: 20px; border-radius: 20px; border: 1px solid #222; }
        h3 { color: #ffd700; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; border-bottom: 1px solid #222; padding-bottom: 8px; margin: 0 0 15px 0; }
        label { display: block; margin: 8px 0 3px; font-size: 9px; color: #666; font-weight: 800; text-transform: uppercase; }
        textarea, input, select { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 6px; box-sizing: border-box; font-size: 12px; outline: none; }
        input:focus { border-color: #ffd700; }
        button { width: 100%; padding: 12px; background: #ffd700; color: #000; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button:hover { background: #ffe033; transform: translateY(-2px); }
        .spin-btn { background: #ff4757 !important; color: #fff !important; font-size: 16px; height: 60px; margin-bottom: 20px; }
        .flavor-row { display: flex; gap: 5px; margin-bottom: 5px; }
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #ffd700; color: #000; padding: 15px 40px; border-radius: 50px; font-weight: 900; transition: 0.5s; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #toast.show { top: 30px; }
        .history-list { max-height: 100px; overflow-y: auto; background: #000; padding: 10px; border-radius: 10px; font-size: 11px; color: #888; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid #222; }
        .btn-del { width: auto; background: #ff4757; color: white; padding: 2px 6px; font-size: 9px; margin: 0; }
    </style>
</head>
<body>
    <div id="toast">НАСТРОЙКИ ПРИМЕНЕНЫ!</div>

    <!-- ЭКРАН ВХОДА -->
    <div id="login-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#080808; z-index:2000; display:flex; justify-content:center; align-items:center;">
        <div class="card" style="width:300px; text-align:center;">
            <h3>Security Access</h3>
            <input type="password" id="pass-input" placeholder="Введите пароль...">
            <button onclick="tryLogin()">ВОЙТИ</button>
        </div>
    </div>

    <div class="grid" id="main-ui" style="display:none;">
        <!-- КОЛОНКА 1: КОНТЕНТ И ЗАПУСК -->
        <div class="card">
            <button class="spin-btn" onclick="triggerSpin()">🚀 ЗАПУСТИТЬ КОЛЕСО</button>
            <h3>📝 Основные настройки</h3>
            <textarea id="opts" style="height:120px;"></textarea>
            <label>Текст кнопки:</label>
            <input type="text" id="btn-text">
            <label>Заголовок призов (Конвейера):</label>
            <input type="text" id="hist-title">
            <label>Время вращения (мс):</label>
            <input type="number" id="spin-time">
            <label>Скорость конвейера (сек):</label>
            <input type="number" id="conv-speed">
            <label><input type="checkbox" id="auto-del"> Удалять при выигрыше автоматически</label>
        </div>

        <!-- КОЛОНКА 2: ДИЗАЙН, РАЗМЕРЫ, ПОЗИЦИИ -->
        <div class="card">
            <h3>📏 Позиции и Размеры</h3>
            <label>Кнопка (W x H x Top):</label>
            <div class="flavor-row"><input type="number" id="btn-w"><input type="number" id="btn-h"><input type="number" id="btn-y"></div>
            <label>Конвейер призов (W x H x Top):</label>
            <div class="flavor-row"><input type="number" id="hist-w"><input type="number" id="hist-h"><input type="number" id="hist-y"></div>
            
            <label>Прозрачность панелей (0.1 - 1.0) / Blur (px):</label>
            <div class="flavor-row"><input type="number" id="p-op" step="0.1"><input type="number" id="p-blur"></div>
            
            <label>URL гифки центра:</label>
            <input type="text" id="center-img">

            <h3>🏹 Дракон Money</h3>
            <label>URL Дракона (PNG/GIF):</label>
            <input type="text" id="dragon-img">
            <label>Размер Дракона (px):</label>
            <input type="number" id="dragon-size">
            <label>Позиция X / Y (%):</label>
            <div class="flavor-row"><input type="number" id="dragon-x"><input type="number" id="dragon-y"></div>
            
            <button onclick="save()" style="background:#fff; color: #000;">ПРИМЕНИТЬ ДИЗАЙН</button>
        </div>

        <!-- КОЛОНКА 3: ШРИФТЫ И ФРАЗЫ -->
        <div class="card">
            <h3>✏️ Шрифты (Размеры px)</h3>
            <label>Текст Колеса / Текст Кнопки:</label>
            <div class="flavor-row"><input type="number" id="fs-wheel"><input type="number" id="fs-btn"></div>
            <label>Список призов / Заголовок списка:</label>
            <div class="flavor-row"><input type="number" id="fs-hist"><input type="number" id="fs-hist-t"></div>

            <h3>💬 Фразы над призами (Flavor)</h3>
            <div id="flavor-list" style="max-height:150px; overflow-y:auto; margin-bottom:5px;"></div>
            <button style="background:#222; color:#fff; font-size:9px;" onclick="addFlavor()">+ Добавить фразу</button>
            
            <button onclick="save()" style="background:#ffd700; color:#000;">СОХРАНИТЬ ВСЁ</button>
            
            <h3 style="margin-top:20px;">📜 История выигрышей</h3>
            <div id="history-box" class="history-list"></div>
            <button onclick="clearHistory()" style="background:#333; color:#777; font-size:9px; margin-top:10px;">Очистить историю</button>
        </div>
    </div>

<script>
    let fullData = { options: [], settings: {}, history: [] };
    let currentPass = localStorage.getItem('spin_pass') || "";

    async function tryLogin() {
        const input = document.getElementById('pass-input').value;
        if (input) currentPass = input;
        const res = await fetch('/api/data');
        if (res.status === 200) {
            fullData = await res.json();
            localStorage.setItem('spin_pass', currentPass);
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-ui').style.display = 'grid';
            fillUI();
        } else { alert("Неверный пароль!"); localStorage.removeItem('spin_pass'); }
    }

    function fillUI() {
        if (!fullData.settings) fullData.settings = {};
        const s = fullData.settings;
        document.getElementById('opts').value = (fullData.options || []).join('\n');
        document.getElementById('btn-text').value = s.startBtnText || "Да-да, Нет-нет";
        document.getElementById('hist-title').value = s.historyTitle || "ПРИЗЫ";
        document.getElementById('spin-time').value = s.spinTime || 12000;
        document.getElementById('conv-speed').value = s.conveyorSpeed || 15;
        document.getElementById('auto-del').checked = s.autoDelete || false;
        document.getElementById('center-img').value = s.centerImage || "";
        
        document.getElementById('btn-w').value = s.startBtnWidth || 500;
        document.getElementById('btn-h').value = s.startBtnHeight || 110;
        document.getElementById('btn-y').value = s.startBtnTop || 100;
        document.getElementById('hist-w').value = s.historyWidth || 340;
        document.getElementById('hist-h').value = s.historyHeight || 220;
        document.getElementById('hist-y').value = s.historyTop || 260;
        
        document.getElementById('p-op').value = s.panelOpacity || 0.7;
        document.getElementById('p-blur').value = s.panelBlur || 15;
        
        document.getElementById('dragon-img').value = s.dragonImg || "";
        document.getElementById('dragon-size').value = s.dragonSize || 200;
        document.getElementById('dragon-x').value = s.dragonX || 50;
        document.getElementById('dragon-y').value = s.dragonY || 50;

        document.getElementById('fs-wheel').value = s.fontWheel || 14;
        document.getElementById('fs-btn').value = s.fontBtn || 50;
        document.getElementById('fs-hist').value = s.fontHist || 15;
        document.getElementById('fs-hist-t').value = s.fontHistTitle || 11;

        const fl = document.getElementById('flavor-list'); fl.innerHTML = '';
        if (s.flavorTexts) {
            for (let [p, t] of Object.entries(s.flavorTexts)) {
                fl.innerHTML += `<div class="flavor-row"><input value="${p}" class="f-p"><input value="${t}" class="f-t"></div>`;
            }
        }
        renderHistory();
    }

    function renderHistory() {
        const box = document.getElementById('history-box');
        box.innerHTML = (fullData.history || []).slice().reverse().map((h, i) => `
            <div class="history-item">
                <span>${h}</span>
                <button class="btn-del" onclick="deleteItem(${fullData.history.length - 1 - i})">✕</button>
            </div>
        `).join('');
    }

    async function save(silent = false) {
        fullData.options = document.getElementById('opts').value.split('\n').filter(x => x.trim());
        const s = fullData.settings;
        s.startBtnText = document.getElementById('btn-text').value;
        s.historyTitle = document.getElementById('hist-title').value;
        s.spinTime = parseInt(document.getElementById('spin-time').value);
        s.conveyorSpeed = parseInt(document.getElementById('conv-speed').value);
        s.centerImage = document.getElementById('center-img').value;
        s.autoDelete = document.getElementById('auto-del').checked;
        
        s.startBtnWidth = parseInt(document.getElementById('btn-w').value);
        s.startBtnHeight = parseInt(document.getElementById('btn-h').value);
        s.startBtnTop = parseInt(document.getElementById('btn-y').value);
        s.historyWidth = parseInt(document.getElementById('hist-w').value);
        s.historyHeight = parseInt(document.getElementById('hist-h').value);
        s.historyTop = parseInt(document.getElementById('hist-y').value);
        
        s.panelOpacity = parseFloat(document.getElementById('p-op').value);
        s.panelBlur = parseInt(document.getElementById('p-blur').value);
        
        s.dragonImg = document.getElementById('dragon-img').value;
        s.dragonSize = parseInt(document.getElementById('dragon-size').value);
        s.dragonX = parseInt(document.getElementById('dragon-x').value);
        s.dragonY = parseInt(document.getElementById('dragon-y').value);
        
        s.fontWheel = parseInt(document.getElementById('fs-wheel').value);
        s.fontBtn = parseInt(document.getElementById('fs-btn').value);
        s.fontHist = parseInt(document.getElementById('fs-hist').value);
        s.fontHistTitle = parseInt(document.getElementById('fs-hist-t').value);

        const f = {}; 
        document.querySelectorAll('.flavor-row').forEach(r => {
            const p = r.querySelector('.f-p').value;
            const t = r.querySelector('.f-t').value;
            if(p) f[p] = t;
        });
        s.flavorTexts = f;
        fullData.password = currentPass;

        const res = await fetch('/api/data', { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(fullData) 
        });

        if (res.status === 200) {
            if(!silent) {
                document.getElementById('toast').classList.add('show');
                setTimeout(()=>document.getElementById('toast').classList.remove('show'), 2000);
            }
            loadDataSilent();
        } else { alert("Ошибка сохранения! Проверьте пароль."); }
    }

    async function loadDataSilent() {
        const res = await fetch('/api/data');
        fullData = await res.json();
        renderHistory();
    }

    function addFlavor() { document.getElementById('flavor-list').innerHTML += `<div class="flavor-row"><input class="f-p" placeholder="Приз"><input class="f-t" placeholder="Фраза"></div>`; }
    async function triggerSpin() { fullData.settings.remoteTrigger = Date.now(); await save(true); }
    async function deleteItem(i) { fullData.history.splice(i, 1); await save(true); }
    async function clearHistory() { if(confirm("Очистить историю?")) { fullData.history = []; await save(true); } }

    if (currentPass) tryLogin();
</script>
</body>
</html>
