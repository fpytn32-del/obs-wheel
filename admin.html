<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Wheel Ultra Admin</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #080808; color: #eee; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1100px; width: 100%; }
        .card { background: #121212; padding: 20px; border-radius: 20px; border: 1px solid #222; }
        h3 { color: #ffd700; text-transform: uppercase; font-size: 13px; letter-spacing: 2px; border-bottom: 1px solid #222; padding-bottom: 10px; margin-top: 0; }
        label { display: block; margin: 10px 0 5px; font-size: 10px; color: #666; font-weight: 800; text-transform: uppercase; }
        textarea, input, select { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; box-sizing: border-box; font-size: 13px; }
        .spin-btn { background: #ff4757; color: #fff; font-size: 22px; height: 100px; margin-bottom: 20px; border: none; border-radius: 15px; cursor: pointer; width: 100%; font-weight: 900; box-shadow: 0 10px 30px rgba(255, 71, 87, 0.3); }
        .save-btn { background: #ffd700; color: #000; width: 100%; margin-top: 20px; font-weight: 900; border: none; padding: 15px; border-radius: 10px; cursor: pointer; }
        .flavor-row { display: flex; gap: 5px; margin-bottom: 5px; }
        
        /* КРАСИВОЕ УВЕДОМЛЕНИЕ */
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #ffd700; color: #000; padding: 15px 40px; border-radius: 50px; font-weight: 900; transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #toast.show { top: 30px; }

        .slider-group { display: flex; align-items: center; gap: 10px; }
        .slider-group span { min-width: 30px; font-size: 12px; color: #ffd700; }
    </style>
</head>
<body>
    <div id="toast">ОБНОВЛЕНО!</div>

    <div id="login" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#080808;z-index:200;display:flex;justify-content:center;align-items:center;">
        <div class="card" style="width:300px; text-align:center;">
            <h3>DASHBOARD ACCESS</h3>
            <input type="password" id="pass" placeholder="Пароль...">
            <button class="save-btn" onclick="load()">ВОЙТИ</button>
        </div>
    </div>

    <div class="grid" id="main-ui" style="display:none;">
        <div class="card">
            <button class="spin-btn" onclick="triggerRemoteSpin()">КРУТИТЬ КОЛЕСО</button>
            
            <h3>🎨 Дизайн Панелей</h3>
            <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 10px;">
                <div>
                    <label>Прозрачность (0-1)</label>
                    <input type="number" id="p-opacity" step="0.1" min="0" max="1">
                </div>
                <div>
                    <label>Размытие (px)</label>
                    <input type="number" id="p-blur">
                </div>
            </div>

            <h3>📍 Позиции (Отступы)</h3>
            <label>Кнопка (Сверху / Слева %)</label>
            <div class="flavor-row">
                <input type="number" id="btn-y" placeholder="Y">
                <input type="number" id="btn-x" placeholder="X %">
            </div>
            <label>История (Сверху / Слева %)</label>
            <div class="flavor-row">
                <input type="number" id="hist-y" placeholder="Y">
                <input type="number" id="hist-x" placeholder="X %">
            </div>

            <h3>✏️ Шрифты</h3>
            <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><label>Колесо (px)</label><input type="number" id="f-wheel"></div>
                <div><label>Кнопка (px)</label><input type="number" id="f-btn"></div>
            </div>
            
            <button class="save-btn" onclick="save()">ПРИМЕНИТЬ ДИЗАЙН</button>
        </div>

        <div class="card">
            <h3>📝 Варианты</h3>
            <textarea id="opts" style="height:120px;"></textarea>
            
            <label>Текст кнопки:</label>
            <input type="text" id="btn-text">

            <label>Время вращения (мс):</label>
            <input type="number" id="spin-time">

            <label>URL гифки центра:</label>
            <input type="text" id="center-img">

            <label><input type="checkbox" id="auto-del"> Удалять при выигрыше</label>

            <h3>📜 История</h3>
            <div id="history-box" style="max-height:100px; overflow-y:auto; font-size:11px; background:#000; padding:10px; border-radius:10px;"></div>
            <button style="background:#222; color:#777; font-size:9px;" onclick="clearHistory()">Очистить историю</button>
        </div>
    </div>

<script>
    let fullData = {};
    let pass = localStorage.getItem('spin_pass') || "";

    function notify() {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    async function load() {
        const p = document.getElementById('pass').value || pass;
        const res = await fetch('/api/data');
        fullData = await res.json();
        if(res.status === 200) {
            pass = p; localStorage.setItem('spin_pass', pass);
            document.getElementById('login').style.display = 'none';
            document.getElementById('main-ui').style.display = 'grid';
            fillFields();
        }
    }

    function fillFields() {
        const s = fullData.settings;
        document.getElementById('opts').value = fullData.options.join('\n');
        document.getElementById('btn-text').value = s.startBtnText;
        document.getElementById('center-img').value = s.centerImage;
        document.getElementById('spin-time').value = s.spinTime;
        document.getElementById('auto-del').checked = s.autoDelete;
        
        document.getElementById('p-opacity').value = s.panelOpacity;
        document.getElementById('p-blur').value = s.panelBlur;
        document.getElementById('btn-y').value = s.startBtnTop;
        document.getElementById('btn-x').value = s.startBtnLeft;
        document.getElementById('hist-y').value = s.historyTop;
        document.getElementById('hist-x').value = s.historyLeft;
        document.getElementById('f-wheel').value = s.fontWheel;
        document.getElementById('f-btn').value = s.fontBtn;

        renderHistory();
    }

    function renderHistory() {
        document.getElementById('history-box').innerHTML = (fullData.history || []).slice().reverse().map((h, i) => `<div>${h}</div>`).join('');
    }

    async function clearHistory() { fullData.history = []; save(true); }

    async function triggerRemoteSpin() {
        fullData.settings.remoteTrigger = Date.now();
        save(true);
    }

    async function save(silent = false) {
        const s = fullData.settings;
        fullData.options = document.getElementById('opts').value.split('\n').filter(x => x.trim());
        s.startBtnText = document.getElementById('btn-text').value;
        s.spinTime = parseInt(document.getElementById('spin-time').value);
        s.centerImage = document.getElementById('center-img').value;
        s.autoDelete = document.getElementById('auto-del').checked;
        
        s.panelOpacity = parseFloat(document.getElementById('p-opacity').value);
        s.panelBlur = parseInt(document.getElementById('p-blur').value);
        s.startBtnTop = parseInt(document.getElementById('btn-y').value);
        s.startBtnLeft = parseInt(document.getElementById('btn-x').value);
        s.historyTop = parseInt(document.getElementById('hist-y').value);
        s.historyLeft = parseInt(document.getElementById('hist-x').value);
        s.fontWheel = parseInt(document.getElementById('f-wheel').value);
        s.fontBtn = parseInt(document.getElementById('f-btn').value);
        
        fullData.password = pass;

        const res = await fetch('/api/data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(fullData) });
        if(res.status === 200) { if(!silent) notify(); load(); }
    }
    if(pass) load();
</script>
</body>
</html>
