<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Wheel Admin Security</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* ЭКРАН ЛОГИНА */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { background: #1a1a1a; padding: 40px; border-radius: 20px; border: 1px solid #333; text-align: center; width: 320px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .login-card h2 { color: #ffd700; margin-bottom: 20px; letter-spacing: 2px; }
        
        /* ГЛАВНАЯ ПАНЕЛЬ */
        #admin-panel { display: none; padding: 20px; width: 100%; max-width: 500px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .status-badge { background: rgba(40, 167, 69, 0.2); color: #28a745; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 20px; border: 1px solid #28a745; }
        
        h3 { margin: 0 0 15px 0; color: #ffd700; text-transform: uppercase; letter-spacing: 2px; font-size: 18px; }
        label { display: block; margin: 15px 0 5px; font-size: 11px; color: #666; text-transform: uppercase; font-weight: bold; }
        
        textarea, input { width: 100%; background: #252525; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; box-sizing: border-box; font-size: 14px; outline: none; transition: border 0.3s; }
        textarea:focus, input:focus { border-color: #ffd700; }
        
        button { width: 100%; padding: 15px; background: #ffd700; color: #000; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 15px; transition: 0.2s; text-transform: uppercase; }
        button:hover { background: #ffe033; transform: translateY(-2px); }
        
        /* ИСТОРИЯ */
        .history-list { margin-top: 20px; max-height: 250px; overflow-y: auto; background: #111; padding: 10px; border-radius: 12px; border: 1px solid #222; }
        .history-item { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 10px 15px; margin-bottom: 8px; border-radius: 8px; font-size: 13px; border-left: 3px solid #ffd700; }
        .btn-del { width: auto; padding: 5px 10px; background: #ff4757; color: white; margin: 0; font-size: 10px; }
        .empty-history { text-align: center; color: #444; padding: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <!-- ЭКРАН ВХОДА -->
    <div id="login-screen">
        <div class="login-card">
            <h2>WHEEL ACCESS</h2>
            <input type="password" id="pass-input" placeholder="Введите пароль...">
            <button onclick="tryLogin()">ВОЙТИ</button>
        </div>
    </div>

    <!-- АДМИН ПАНЕЛЬ -->
    <div id="admin-panel">
        <div class="card">
            <div class="status-badge">● ДОСТУП РАЗРЕШЕН</div>
            <h3>⚙ Настройки колеса</h3>
            
            <label>Варианты (каждый с новой строки):</label>
            <textarea id="opts" style="height: 100px;"></textarea>

            <label>Текст на кнопке:</label>
            <input type="text" id="btn-text">

            <label>Файл звука (.mp3):</label>
            <input type="text" id="win-sound">

            <button onclick="save()">Сохранить изменения</button>

            <h3 style="margin-top: 30px;">📜 История выигрышей</h3>
            <div id="history-box" class="history-list"></div>
            <button style="background: #333; color: #888; font-size: 10px;" onclick="clearAllHistory()">Очистить всё</button>
            <button style="background: transparent; color: #444; font-size: 9px; margin-top: 10px;" onclick="logout()">Выйти из системы</button>
        </div>
    </div>

<script>
    let fullData = {};
    let currentPassword = localStorage.getItem('admin_pass') || "";

    // Функция входа
    async function tryLogin() {
        const pass = document.getElementById('pass-input').value;
        if (!pass) return alert("Введите пароль!");
        
        // Пробуем загрузить данные с этим паролем
        currentPassword = pass;
        const success = await load();
        
        if (success) {
            localStorage.setItem('admin_pass', pass);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        } else {
            alert("Неверный пароль или ошибка сервера!");
        }
    }

    async function load() {
        try {
            const res = await fetch('/api/data');
            fullData = await res.json();
            
            // Если данные загружены, заполняем поля
            document.getElementById('opts').value = fullData.options ? fullData.options.join('\n') : "";
            document.getElementById('btn-text').value = fullData.settings ? fullData.settings.startBtnText : "";
            document.getElementById('win-sound').value = fullData.settings ? fullData.settings.spinSound : "";
            renderHistory();
            return true;
        } catch (e) {
            return false;
        }
    }

    function renderHistory() {
        const box = document.getElementById('history-box');
        if (!fullData.history || fullData.history.length === 0) {
            box.innerHTML = '<div class="empty-history">История пока пуста...</div>';
            return;
        }
        
        box.innerHTML = fullData.history.slice().reverse().map((item, i) => {
            const originalIndex = fullData.history.length - 1 - i;
            return `
                <div class="history-item">
                    <span>${item}</span>
                    <button class="btn-del" onclick="deleteHistoryItem(${originalIndex})">✕</button>
                </div>
            `;
        }).join('');
    }

    async function deleteHistoryItem(index) {
        fullData.history.splice(index, 1);
        await save(true);
    }

    async function clearAllHistory() {
        if(confirm("Удалить всю историю?")) {
            fullData.history = [];
            await save(true);
        }
    }

    async function save(silent = false) {
        fullData.options = document.getElementById('opts').value.split('\n').filter(s => s.trim());
        fullData.settings.startBtnText = document.getElementById('btn-text').value;
        fullData.settings.spinSound = document.getElementById('win-sound').value;
        fullData.password = currentPassword;

        const res = await fetch('/api/data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(fullData)
        });

        if (res.status === 403) {
            alert("Ошибка доступа! Перезайдите.");
            logout();
        } else {
            if(!silent) alert("Настройки обновлены!");
            renderHistory();
        }
    }

    function logout() {
        localStorage.removeItem('admin_pass');
        location.reload();
    }

    // Авто-вход, если пароль уже сохранен
    if (currentPassword) {
        document.getElementById('pass-input').value = currentPassword;
        tryLogin();
    }
</script>
</body>
</html>
