<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Wheel Master Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #080808; color: #eee; padding: 20px; display: flex; justify-content: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; max-width: 1300px; width: 100%; }
        .card { background: #121212; padding: 20px; border-radius: 20px; border: 1px solid #222; }
        h3 { color: #ffd700; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; border-bottom: 1px solid #222; padding-bottom: 8px; margin-top: 0; margin-bottom: 15px; }
        label { display: block; margin: 8px 0 3px; font-size: 9px; color: #666; font-weight: 800; text-transform: uppercase; }
        textarea, input, select { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 6px; box-sizing: border-box; font-size: 12px; }
        button { width: 100%; padding: 12px; background: #ffd700; color: #000; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .spin-btn { background: #ff4757; color: #fff; font-size: 16px; height: 50px; margin-bottom: 15px; }
        .flavor-row { display: flex; gap: 5px; margin-bottom: 5px; }
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #ffd700; color: #000; padding: 15px 40px; border-radius: 50px; font-weight: 900; transition: 0.5s; z-index: 1000; }
        #toast.show { top: 30px; }
    </style>
</head>
<body>
    <div id="toast">НАСТРОЙКИ СОХРАНЕНЫ!</div>
    <div id="login" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#080808;z-index:200;display:flex;justify-content:center;align-items:center;">
        <div class="card" style="width:280px; text-align:center;">
            <h3>Access Control</h3>
            <input type="password" id="pass" placeholder="Пароль...">
            <button onclick="load()">ВОЙТИ</button>
        </div>
    </div>

    <div class="grid" id="main-ui" style="display:none;">
        <div class="card">
            <button class="spin-btn" onclick="triggerRemoteSpin()">🚀 ЗАПУСТИТЬ КОЛЕСО</button>
            <h3>📝 Тексты и Время</h3>
            <textarea id="opts" style="height:100px;"></textarea>
            <label>Текст кнопки:</label>
            <input type="text" id="btn-text">
            <label>Заголовок истории:</label>
            <input type="text" id="hist-title-text">
            <label>Время вращения (мс):</label>
            <input type="number" id="spin-time">
            <label><input type="checkbox" id="auto-del"> Удалять при выигрыше</label>
            <label>URL гифки центра:</label>
            <input type="text" id="center-img">
        </div>

        <div class="card">
            <h3>📏 Размеры и Позиции</h3>
            <label>Кнопка (Ширина x Высота):</label>
            <div class="flavor-row"><input type="number" id="btn-w"><input type="number" id="btn-h"></div>
            <label>Кнопка (Отступ Y):</label>
            <input type="number" id="btn-y">
            
            <label>История (Ширина x Высота):</label>
            <div class="flavor-row"><input type="number" id="hist-w"><input type="number" id="hist-h"></div>
            <label>История (Отступ Y):</label>
            <input type="number" id="hist-y">

            <label>Прозрачность / Размытие:</label>
            <div class="flavor-row"><input type="number" id="p-op" step="0.1"><input type="number" id="p-blur"></div>
            
            <button onclick="save()" style="background:#fff;">ПРИМЕНИТЬ ДИЗАЙН</button>
        </div>

        <div class="card">
            <h3>✏️ Шрифты и Фразы</h3>
            <label>Шрифт Колеса / Размер:</label>
            <div class="flavor-row"><select id="f-wheel-fam"><option value="Inter">Inter</option><option value="Montserrat">Montserrat</option></select><input type="number" id="f-wheel-size"></div>
            
            <label>Шрифт Кнопки / Размер:</label>
            <div class="flavor-row"><select id="f-btn-fam"><option value="Inter">Inter</option><option value="Montserrat">Montserrat</option></select><input type="number" id="f-btn-size"></div>
            
            <label>Размер Заголовка / Списка истории:</label>
            <div class="flavor-row"><input type="number" id="f-hist-title"><input type="number" id="f-hist-size"></div>

            <label>Фразы над призами:</label>
            <div id="flavor-list" style="max-height:100px; overflow-y:auto; margin-bottom:5px;"></div>
            <button style="background:#222; color:#fff; font-size:9px;" onclick="addFlavor()">+ Добавить фразу</button>

            <h3>📜 История</h3>
            <div id="history-box" style="max-height:60px; overflow-y:auto; background:#000; padding:5px; font-size:10px;"></div>
            <button style="background:#333; color:#777; font-size:9px;" onclick="clearHistory()">Очистить историю</button>
        </div>
    </div>

<script>
    let fullData = {};
    let pass = localStorage.getItem('spin_pass') || "";
    async function load() {
        const p = document.getElementById('pass').value || pass;
        const res = await fetch('/api/data');
        fullData = await res.json();
        if(res.status === 200) {
            pass = p; localStorage.setItem('spin_pass', pass);
            document.getElementById('login').style.display = 'none';
            document.getElementById('main-ui').style.display = 'grid';
            fillFields();
        }
    }
    function fillFields() {
        const s = fullData.settings;
        document.getElementById('opts').value = fullData.options.join('\n');
        document.getElementById('btn-text').value = s.startBtnText;
        document.getElementById('hist-title-text').value = s.historyTitle;
        document.getElementById('spin-time').value = s.spinTime;
        document.getElementById('auto-del').checked = s.autoDelete;
        document.getElementById('center-img').value = s.centerImage;
        document.getElementById('btn-w').value = s.startBtnWidth;
        document.getElementById('btn-h').value = s.startBtnHeight;
        document.getElementById('btn-y').value = s.startBtnTop;
        document.getElementById('hist-w').value = s.historyWidth;
        document.getElementById('hist-h').value = s.historyHeight;
        document.getElementById('hist-y').value = s.historyTop;
        document.getElementById('p-op').value = s.panelOpacity;
        document.getElementById('p-blur').value = s.panelBlur;
        document.getElementById('f-wheel-size').value = s.fontWheel;
        document.getElementById('f-btn-size').value = s.fontBtn;
        document.getElementById('f-hist-size').value = s.fontHist;
        document.getElementById('f-hist-title').value = s.fontHistTitle;
        
        const fList = document.getElementById('flavor-list'); fList.innerHTML = '';
        for (let [p, t] of Object.entries(s.flavorTexts || {})) fList.innerHTML += `<div class="flavor-row"><input value="${p}" class="f-p"><input value="${t}" class="f-t"></div>`;
        renderHistory();
    }
    function renderHistory() { document.getElementById('history-box').innerHTML = (fullData.history || []).slice().reverse().map(h => `<div>${h}</div>`).join(''); }
    async function save(silent = false) {
        const s = fullData.settings;
        fullData.options = document.getElementById('opts').value.split('\n').filter(x => x.trim());
        s.startBtnText = document.getElementById('btn-text').value;
        s.historyTitle = document.getElementById('hist-title-text').value;
        s.spinTime = parseInt(document.getElementById('spin-time').value);
        s.centerImage = document.getElementById('center-img').value;
        s.autoDelete = document.getElementById('auto-del').checked;
        s.startBtnWidth = parseInt(document.getElementById('btn-w').value);
        s.startBtnHeight = parseInt(document.getElementById('btn-h').value);
        s.startBtnTop = parseInt(document.getElementById('btn-y').value);
        s.historyWidth = parseInt(document.getElementById('hist-w').value);
        s.historyHeight = parseInt(document.getElementById('hist-h').value);
        s.historyTop = parseInt(document.getElementById('hist-y').value);
        s.panelOpacity = parseFloat(document.getElementById('p-op').value);
        s.panelBlur = parseInt(document.getElementById('p-blur').value);
        s.fontWheel = parseInt(document.getElementById('f-wheel-size').value);
        s.fontBtn = parseInt(document.getElementById('f-btn-size').value);
        s.fontHist = parseInt(document.getElementById('f-hist-size').value);
        s.fontHistTitle = parseInt(document.getElementById('f-hist-title').value);
        const f = {}; document.querySelectorAll('.flavor-row').forEach(r => { if(r.querySelector('.f-p').value) f[r.querySelector('.f-p').value] = r.querySelector('.f-t').value; });
        s.flavorTexts = f; fullData.password = pass;
        const res = await fetch('/api/data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(fullData) });
        if(res.status === 200) { if(!silent) { const t = document.getElementById('toast'); t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); } load(); }
    }
    function addFlavor() { document.getElementById('flavor-list').innerHTML += `<div class="flavor-row"><input class="f-p"><input class="f-t"></div>`; }
    async function triggerRemoteSpin() { fullData.settings.remoteTrigger = Date.now(); save(true); }
    async function clearHistory() { fullData.history = []; save(true); }
</script>
</body>
</html>
