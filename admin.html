<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Wheel Admin</title>
    <style>
        body { font-family: sans-serif; background: #080808; color: #eee; padding: 20px; display: flex; justify-content: center; }
        .card { background: #121212; padding: 30px; border-radius: 20px; border: 1px solid #333; width: 400px; }
        h3 { color: #ffd700; text-transform: uppercase; font-size: 12px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        label { display: block; margin: 10px 0 5px; font-size: 10px; color: #666; font-weight: 800; text-transform: uppercase; }
        textarea, input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ffd700; color: #000; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="login" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#080808; display:flex; justify-content:center; align-items:center; z-index:100;">
        <div class="card" style="text-align:center;">
            <h3>Access</h3>
            <input type="password" id="pass" placeholder="Пароль...">
            <button onclick="load()">ВОЙТИ</button>
        </div>
    </div>

    <div class="card" id="ui" style="display:none;">
        <h3>⚙ Настройки</h3>
        <label>Варианты (с новой строки):</label>
        <textarea id="opts" style="height:150px;"></textarea>
        <label>Текст кнопки:</label>
        <input type="text" id="btn-text">
        <label>Скорость конвейера (сек):</label>
        <input type="number" id="conv-speed">
        <button onclick="save()">СОХРАНИТЬ ВСЁ</button>
    </div>

<script>
    let fullData = {}; let pass = localStorage.getItem('spin_pass') || "";
    async function load() {
        const p = document.getElementById('pass').value || pass;
        const res = await fetch('/api/data');
        fullData = await res.json();
        if (res.status === 200) {
            pass = p; localStorage.setItem('spin_pass', pass);
            document.getElementById('login').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            document.getElementById('opts').value = fullData.options.join('\n');
            document.getElementById('btn-text').value = fullData.settings.startBtnText;
            document.getElementById('conv-speed').value = fullData.settings.conveyorSpeed || 15;
        }
    }
    async function save() {
        fullData.options = document.getElementById('opts').value.split('\n').filter(x => x.trim());
        fullData.settings.startBtnText = document.getElementById('btn-text').value;
        fullData.settings.conveyorSpeed = parseInt(document.getElementById('conv-speed').value);
        fullData.password = pass;
        await fetch('/api/data', { method: 'POST', body: JSON.stringify(fullData) });
        alert("Сохранено!");
    }
    if (pass) load();
</script>
</body>
</html>
