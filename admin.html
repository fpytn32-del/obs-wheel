<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Wheel Admin Ultra</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #080808; color: #eee; padding: 20px; display: flex; justify-content: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1000px; width: 100%; }
        .card { background: #121212; padding: 20px; border-radius: 20px; border: 1px solid #222; }
        h3 { color: #ffd700; text-transform: uppercase; font-size: 13px; letter-spacing: 2px; border-bottom: 1px solid #222; padding-bottom: 10px; margin-top: 0; }
        label { display: block; margin: 10px 0 5px; font-size: 10px; color: #666; font-weight: 800; text-transform: uppercase; }
        textarea, input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; box-sizing: border-box; font-size: 13px; }
        button { width: 100%; padding: 15px; background: #ffd700; color: #000; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        .spin-btn { background: #ff4757; color: #fff; font-size: 20px; height: 80px; margin-bottom: 20px; }
        
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #ffd700; color: #000; padding: 15px 40px; border-radius: 50px; font-weight: 900; transition: 0.5s; z-index: 1000; }
        #toast.show { top: 30px; }
    </style>
</head>
<body>
    <div id="toast">НАСТРОЙКИ ПРИМЕНЕНЫ!</div>

    <div id="login" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#080808;z-index:200;display:flex;justify-content:center;align-items:center;">
        <div class="card" style="width:300px; text-align:center;">
            <h3>DASHBOARD ACCESS</h3>
            <input type="password" id="pass" placeholder="Пароль...">
            <button onclick="load()">ВОЙТИ</button>
        </div>
    </div>

    <div class="grid" id="main-ui" style="display:none;">
        <div class="card">
            <button class="spin-btn" onclick="triggerRemoteSpin()">🚀 КРУТИТЬ КОЛЕСО</button>
            
            <h3>🎨 Дизайн и Позиции</h3>
            <label>Прозрачность панелей (0.1 - 1.0):</label>
            <input type="number" id="p-opacity" step="0.1" min="0" max="1">

            <label>Высота кнопки (Y px):</label>
            <input type="number" id="btn-y">

            <label>Высота истории (Y px):</label>
            <input type="number" id="hist-y">

            <h3 style="margin-top:20px;">✏️ Размеры шрифтов (px)</h3>
            <label>Текст в секторах колеса:</label>
            <input type="number" id="f-wheel">

            <label>Текст на кнопке запуска:</label>
            <input type="number" id="f-btn">

            <label>Текст в истории выигрышей:</label>
            <input type="number" id="f-hist">
            
            <button onclick="save()">ПРИМЕНИТЬ ИЗМЕНЕНИЯ</button>
        </div>

        <div class="card">
            <h3>📝 Контент</h3>
            <label>Варианты (каждый с новой строки):</label>
            <textarea id="opts" style="height:120px;"></textarea>
            
            <label>Текст кнопки:</label>
            <input type="text" id="btn-text">

            <label>URL гифки центра:</label>
            <input type="text" id="center-img">

            <label><input type="checkbox" id="auto-del"> Удалять при выигрыше</label>

            <h3 style="margin-top:20px;">📜 История</h3>
            <div id="history-box" style="max-height:120px; overflow-y:auto; background:#000; padding:10px; border-radius:10px; font-size:12px;"></div>
            <button style="background:#222; color:#777; font-size:9px;" onclick="clearHistory()">Очистить историю</button>
        </div>
    </div>

<script>
    let fullData = {};
    let pass = localStorage.getItem('spin_pass') || "";

    async function load() {
        const p = document.getElementById('pass').value || pass;
        const res = await fetch('/api/data');
        fullData = await res.json();
        if(res.status === 200) {
            pass = p; localStorage.setItem('spin_pass', pass);
            document.getElementById('login').style.display = 'none';
            document.getElementById('main-ui').style.display = 'grid';
            fillFields();
        }
    }

    function fillFields() {
        const s = fullData.settings;
        document.getElementById('opts').value = fullData.options.join('\n');
        document.getElementById('btn-text').value = s.startBtnText;
        document.getElementById('center-img').value = s.centerImage;
        document.getElementById('btn-y').value = s.startBtnTop;
        document.getElementById('hist-y').value = s.historyTop;
        document.getElementById('p-opacity').value = s.panelOpacity;
        document.getElementById('auto-del').checked = s.autoDelete;
        
        // Шрифты
        document.getElementById('f-wheel').value = s.fontWheel || 14;
        document.getElementById('f-btn').value = s.fontBtn || 50;
        document.getElementById('f-hist').value = s.fontHist || 16;

        renderHistory();
    }

    function renderHistory() {
        document.getElementById('history-box').innerHTML = (fullData.history || []).slice().reverse().map(h => `<div>${h}</div>`).join('');
    }

    async function save(silent = false) {
        const s = fullData.settings;
        fullData.options = document.getElementById('opts').value.split('\n').filter(x => x.trim());
        s.startBtnText = document.getElementById('btn-text').value;
        s.centerImage = document.getElementById('center-img').value;
        s.startBtnTop = parseInt(document.getElementById('btn-y').value);
        s.historyTop = parseInt(document.getElementById('hist-y').value);
        s.panelOpacity = parseFloat(document.getElementById('p-opacity').value);
        s.autoDelete = document.getElementById('auto-del').checked;
        
        // Сохраняем шрифты
        s.fontWheel = parseInt(document.getElementById('f-wheel').value);
        s.fontBtn = parseInt(document.getElementById('f-btn').value);
        s.fontHist = parseInt(document.getElementById('f-hist').value);
        
        fullData.password = pass;

        const res = await fetch('/api/data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(fullData) });
        if(res.status === 200) {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
            load();
        }
    }

    async function triggerRemoteSpin() {
        fullData.settings.remoteTrigger = Date.now();
        save(true);
    }
    async function clearHistory() { fullData.history = []; save(true); }

    if(pass) load();
</script>
</body>
</html>
